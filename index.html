<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
        }

        body {
            min-height: 100vh;
            min-width: 100vw;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        video.bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }
    
        h1, h2{ 
            color: white;
        }

        h1{
            font-size: 150px;
        }

        h2{
            font-size: 100px;
            animation: move 2s ease-in 1s forwards 1;
        }


        @keyframes move {
            from{
                transform: translateY(200px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        

    </style>
</head>

<body>
    <video class="bg-video"
        src="video.mp4"
        autoplay loop muted></video>

    <h1>SPEED</h1>
    <h2>Accelerating Towards Success</h2>
</body>

</html>
